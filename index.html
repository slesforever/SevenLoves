<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // INTRUSION_LOG</title>
    <style>
        :root {
            --bg-color: #050505;
            --term-color: #7a8a7a; /* 冰冷、無生機的灰綠色 */
            --alert-color: #a34747; /* 警報暗紅 */
            --unlock-color: #c99738; /* 解鎖金 */
            --text-color: #bbbbbb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* CRT 螢幕濾鏡 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 2;
            background-size: 100% 3px, 5px 100%;
            pointer-events: none;
        }

        .terminal-container {
            width: 100%;
            height: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            z-index: 1;
            position: relative;
        }

        .header-bar {
            border-bottom: 1px solid rgba(122, 138, 122, 0.2);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--term-color);
            letter-spacing: 2px;
        }

        .output-area {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .output-area::-webkit-scrollbar { width: 3px; }
        .output-area::-webkit-scrollbar-thumb { background: var(--term-color); }

        .line {
            margin-bottom: 8px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.9rem;
        }

        .sys-mode { color: var(--term-color); }
        .alert-mode { color: var(--alert-color); font-weight: bold; }
        .unlock-mode { color: var(--unlock-color); text-shadow: 0 0 4px var(--unlock-color); }
        .redacted { background-color: #222; color: #222; }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid rgba(122, 138, 122, 0.1);
            padding-top: 15px;
        }

        .prompt {
            color: var(--term-color);
            margin-right: 12px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            flex-grow: 1;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header-bar">
            <span>NODE_ID: ERROR_RECV_0x00F</span>
            <span id="sync-status">LINK: CORRUPTED</span>
        </div>

        <div class="output-area" id="output"></div>

        <div class="input-line">
            <span class="prompt">>></span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        
        // 破碎且充滿進制密碼的檔案
        const archives = {
            "sys_status": `[MEM_DUMP] -------------------------------------\nCORE_STATE: HALT\nCOGNITIVE_ARRAY: <span class="redacted">████████</span>\nERROR_CODE: 0x7E\n\n系統常數已失真。底層物理規則出現維度崩塌跡象。\n偵測到未知的二維（2D）數據流試圖強行侵蝕現實。`,
            "leak_0x7f": `[RAW_INTRUSION_DATA] ---------------------------\n警告：此檔案包含未重組的高危頻率。\n\n[ADDR]      [HEX DATA]                [ASCII]\n0x0010      4c 37 45 5f 49 4e 49 54   ????????\n0x0018      <span class="redacted">██ ██ ██ ██ ██ ██ ██ ██</span>   ********\n\n【提示】偵測到系統防護層。請將 0x0010 處的 16 進位數據（HEX）轉換為文字字串（String），並使用 [ decrypt ] 指令提交以解鎖主通道。`
        };

        const bootSequence = [
            { text: "STTR: OVERFLOW_DETECTED...", type: "sys-mode", delay: 200 },
            { text: "FATAL: CORE DATA UNREADABLE. SWITCHING TO RAW TERMINAL.", type: "alert-mode", delay: 400 },
            { text: "--------------------------------------------------", type: "sys-mode", delay: 100 },
            { text: "外部信號攔截成功。當前節點處於唯讀隔離狀態。", type: "sys-mode", delay: 200 },
            { text: "輸入 [ help ] 查看基本可用緊急指令。", type: "sys-mode", delay: 100 },
            { text: "--------------------------------------------------", type: "sys-mode", delay: 100 }
        ];

        async function playBoot() {
            input.disabled = true;
            for (let seq of bootSequence) {
                await printLine(seq.text, seq.type, seq.delay);
            }
            input.disabled = false;
            input.focus();
            
            if(localStorage.getItem("l7e_pre_decrypted") === "true") {
                document.getElementById('sync-status').textContent = "LINK: ALIGNED";
                document.getElementById('sync-status').style.color = "var(--unlock-color)";
                printLine("\n[通道保持解鎖狀態。視覺頻率矩陣就緒。]", "unlock-mode");
            }
        }

        function printLine(text, className = "sys-mode", delay = 0) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = `line ${className}`;
                    line.innerHTML = text;
                    output.appendChild(line);
                    output.scrollTop = output.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                input.value = '';
                if (!rawInput) return;

                await printLine(`>> ${rawInput}`, "text-color");
                const parts = rawInput.split(' ');
                const cmd = parts[0].toLowerCase();
                const arg = parts.slice(1).join(' ');

                switch (cmd) {
                    case 'help':
                        await printLine("緊急備用指令：", "sys-mode");
                        await printLine("  ls           - 掃描當前緩衝區的損壞數據包", "sys-mode");
                        await printLine("  cat [名稱]   - 傾印指定數據包內容", "sys-mode");
                        await printLine("  decrypt [碼] - 提交重組後的解密字串", "sys-mode");
                        await printLine("  clear        - 清空終端機螢幕", "sys-mode");
                        break;

                    case 'ls':
                        await printLine("暫存記憶體區塊：", "sys-mode");
                        await printLine("  sys_status.log", "sys-mode");
                        await printLine("  leak_0x7f.dat", "sys-mode");
                        if (localStorage.getItem("l7e_pre_decrypted") === "true") {
                            await printLine("  VISUAL_BROADCAST.stream (已解鎖)", "unlock-mode");
                        } else {
                            await printLine("  [??] 偵測到受阻斷的加密訊號源，需要主通道權限。", "alert-mode");
                        }
                        break;

                    case 'cat':
                        if (!arg) {
                            await printLine("錯誤：未知傾印目標。", "alert-mode");
                        } else if (arg === 'sys_status.log' || arg === 'sys_status') {
                            await printLine(archives.sys_status, "text-color");
                        } else if (arg === 'leak_0x7f.dat' || arg === 'leak_0x7f') {
                            await printLine(archives.leak_0x7f, "text-color");
                        } else if (arg === 'VISUAL_BROADCAST.stream' || arg === 'VISUAL_BROADCAST') {
                            if (localStorage.getItem("l7e_pre_decrypted") === "true") {
                                await printLine("【外部視覺信號接收端點 // 建立成功】\n\n訊號類別：FIRST_VISUAL_POSTER\n封包狀態：等待物理廣播（PENDING_BROADCAST）\n\n[觀測日誌]\n巨幅意象圖層已在端點後方完成渲染。\n光譜尚未對齊。當官方正式投放具象信號之日，此處的盲區將同步點亮。\n請維持此端點連線。", "unlock-mode");
                            } else {
                                await printLine("權限不足。拒絕讀取未對齊的數據流。", "alert-mode");
                            }
                        } else {
                            await printLine(`錯誤：找不到區塊 '${arg}'`, "alert-mode");
                        }
                        break;

                    case 'decrypt':
                        if (!arg) {
                            await printLine("錯誤：未輸入解密字串。用法: decrypt [字串]", "alert-mode");
                        } else if (arg.toUpperCase() === 'L7E_INIT') {
                            localStorage.setItem("l7e_pre_decrypted", "true");
                            document.getElementById('sync-status').textContent = "LINK: ALIGNED";
                            document.getElementById('sync-status').style.color = "var(--unlock-color)";
                            await printLine("==========================================", "unlock-mode", 50);
                            await printLine("【HEX 解碼驗證通過】通道共振頻率已對齊。", "unlock-mode", 150);
                            await printLine("解鎖高維視覺流：[ VISUAL_BROADCAST.stream ]", "unlock-mode", 150);
                            await printLine("==========================================", "unlock-mode", 50);
                        } else {
                            await printLine("【驗證失敗】解碼字串與內存不符。認知防護未解除。", "alert-mode");
                        }
                        break;

                    case 'clear':
                        output.innerHTML = '';
                        break;

                    default:
                        await printLine(`指令未定義: '${cmd}'。`, "alert-mode");
                        break;
                }
            }
        });

        document.addEventListener('click', () => {
            if (!input.disabled) input.focus();
        });

        playBoot();
    </script>
</body>
</html>
