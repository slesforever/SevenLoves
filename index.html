<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L7E // RESTRICTED_STREAM</title>
    <style>
        :root {
            --bg-color: #060606;
            --term-gray: #555555;   /* 壓抑的死寂灰 */
            --term-light: #b5b5b5;  /* 正常文字 */
            --term-alert: #7c2222;  /* 暗紅警告 */
            --term-accent: #9c8047; /* 隱約的暗金 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-light);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 2;
            background-size: 100% 3px, 4px 100%;
            pointer-events: none;
        }

        .terminal-container {
            width: 100%;
            height: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            z-index: 1;
            position: relative;
        }

        .header-bar {
            border-bottom: 1px solid rgba(85, 85, 85, 0.3);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--term-gray);
            letter-spacing: 2px;
        }

        .output-area {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .output-area::-webkit-scrollbar { width: 3px; }
        .output-area::-webkit-scrollbar-thumb { background: var(--term-gray); }

        .line {
            margin-bottom: 6px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.85rem;
        }

        .sys-gray { color: var(--term-gray); }
        .sys-alert { color: var(--term-alert); font-weight: bold; }
        .sys-accent { color: var(--term-accent); }
        
        /* 讓亂碼區塊看起來更密集、更有干擾感 */
        .noise-block {
            color: #2a2a2a;
            letter-spacing: -1px;
            line-height: 1.2;
            margin: 5px 0;
        }
        .anomaly {
            color: #888888;
            font-weight: bold;
            background: rgba(255,255,255,0.02);
            padding: 0 2px;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid rgba(85, 85, 85, 0.1);
            padding-top: 15px;
        }

        .prompt {
            color: var(--term-gray);
            margin-right: 10px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--term-light);
            font-family: inherit;
            font-size: 0.9rem;
            flex-grow: 1;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header-bar">
            <span>OFFLINE_RECEIVER://PORT_ERROR</span>
            <span id="sync-status">SCAN_MODE: PASSIVE</span>
        </div>

        <div class="output-area" id="output"></div>

        <div class="input-line">
            <span class="prompt">guest@l7e_isolated_nodes:#</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        
        // 亂碼與規律干擾設計 (無任何實質劇透，純粹靠結構異常讓玩家猜測)
        const archives = {
            "node_01": `<div class="noise-block">0000FF00 45A2C3EE 99001122 FFEEAA22 0000FF00 45A2C3EE
0000FF00 45A2C3EE 99001122 <span class="anomaly">[d/.../]</span> 0000FF00 45A2C3EE
0000FF00 45A2C3EE 99001122 FFEEAA22 0000FF00 45A2C3EE
0000FF00 45A2C3EE 99001122 FFEEAA22 0000FF00 45A2C3EE</div>`,

            "node_02": `<div class="noise-block">▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒<span class="anomaly">[dates/]</span>▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒</div>`,

            "node_03": `<div class="noise-block">ERR_OVERFLOW: STACK_LOG_DUMP_REJECTED_BY_COGNITIVE_SHIELD
ERR_OVERFLOW: STACK_LOG_DUMP_REJECTED_BY_COGNITIVE_SHIELD
ERR_OVERFLOW: <span class="anomaly">[$!#%/)/(-.logs]</span>_REJECTED_BY_COGNITIVE_SHIELD
ERR_OVERFLOW: STACK_LOG_DUMP_REJECTED_BY_COGNITIVE_SHIELD</div>`
        };

        const bootSequence = [
            { text: "SIGNAL LOSS: 98.2%", type: "sys-gray", delay: 100 },
            { text: "STVAL_LOCAL_CORE... FAILED.", type: "sys-alert", delay: 300 },
            { text: "正在切斷主動追蹤。改由監聽殘留快取暫存區...", type: "sys-gray", delay: 200 },
            { text: "目前殘留數據已載入。輸入 [ help ] 檢視基礎可用控制指令。", type: "sys-gray", delay: 100 },
            { text: "--------------------------------------------------", type: "sys-gray", delay: 50 }
        ];

        async function playBoot() {
            input.disabled = true;
            for (let seq of bootSequence) {
                await printLine(seq.text, seq.type, seq.delay);
            }
            input.disabled = false;
            input.focus();
            
            if(localStorage.getItem("l7e_ghost_linked") === "true") {
                document.getElementById('sync-status').textContent = "SCAN_MODE: TUNED";
                document.getElementById('sync-status').style.color = "var(--term-accent)";
                printLine("\n[偵測到本地歷史頻率鎖定紀錄。視覺矩陣接收口保持開放。]", "sys-accent");
            }
        }

        function printLine(text, className = "sys-gray", delay = 0) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = `line ${className}`;
                    line.innerHTML = text;
                    output.appendChild(line);
                    output.scrollTop = output.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                input.value = '';
                if (!rawInput) return;

                await printLine(`guest@l7e_isolated_nodes:# ${rawInput}`, "term-light");
                
                // 解析指令與參數
                const parts = rawInput.split(' ');
                const cmd = parts[0].toLowerCase();
                // 這裡保留完整的參數字串（包含特殊字元與斜線路徑）
                const arg = parts.slice(1).join(' ').trim();

                switch (cmd) {
                    case 'help':
                        await printLine("現存可用系統指令：", "sys-gray");
                        await printLine("  ls               - 列出本節點快取記憶體中的檔案碎塊", "sys-gray");
                        await printLine("  cat [檔案/路徑]  - 讀取指定的碎塊或引導定位目標", "sys-gray");
                        await printLine("  clear            - 清理終端緩衝區", "sys-gray");
                        break;

                    case 'ls':
                        await printLine("目前快取碎塊清單：", "sys-gray");
                        await printLine("  node_01.err", "sys-gray");
                        await printLine("  node_02.raw", "sys-gray");
                        await printLine("  node_03.tmp", "sys-gray");
                        break;

                    case 'cat':
                        if (!arg) {
                            await printLine("系統提示：必須指定讀取對象。例如: cat node_01.err", "sys-alert");
                        } else if (arg === 'node_01.err' || arg === 'node_01') {
                            await printLine(archives.node_01, "term-light");
                        } else if (arg === 'node_02.raw' || arg === 'node_02') {
                            await printLine(archives.node_02, "term-light");
                        } else if (arg === 'node_03.tmp' || arg === 'node_03') {
                            await printLine(archives.node_03, "term-light");
                        } 
                        // 【核心解謎點】：盲打輸入拼接出來的隱藏路徑
                        else if (arg === 'd/.../dates/$!#%/)/(-.logs' || arg === 'd/.../dates/$!#%/)/(-.logs') {
                            localStorage.setItem("l7e_ghost_linked", "true");
                            document.getElementById('sync-status').textContent = "SCAN_MODE: TUNED";
                            document.getElementById('sync-status').style.color = "var(--term-accent)";
                            
                            await printLine("==================================================", "sys-accent", 50);
                            await printLine("【SUCCESS // GHOST_PATH_IDENTIFIED】幽靈路徑對齊成功。", "sys-accent", 100);
                            await printLine("底層視覺數據流（VISUAL_STREAM）接收端點已強行激活。", "sys-accent", 100);
                            await printLine("\n[狀態：等待母體物理廣播中 (AWAITING PHYSICAL BROADCAST)]", "term-light", 150);
                            await printLine("終端已就位。當第一幅意象（First Poster）於現實世界投放時，這裡將同步解鎖像素矩陣。", "sys-accent", 200);
                            await printLine("==================================================", "sys-accent", 50);
                        } else {
                            await printLine(`錯誤：找不到路徑或檔案 '${arg}'。該記憶體區塊可能未被指配。`, "sys-alert");
                        }
                        break;

                    case 'clear':
                        output.innerHTML = '';
                        break;

                    default:
                        await printLine(`無此指令: '${cmd}'。可輸入 'help' 獲取系統核心命令。`, "sys-alert");
                        break;
                }
            }
        });

        document.addEventListener('click', () => {
            if (!input.disabled) input.focus();
        });

        playBoot();
    </script>
</body>
</html>
