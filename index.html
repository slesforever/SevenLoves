<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        :root {
            --bg-color: #040404;
            --term-dim: #444444;     /* 幾乎熄滅的死灰色 */
            --term-plain: #aaaaaa;   /* 基礎冷白 */
            --term-alert: #801a1a;   /* 鐵鏽暗紅 */
            --term-glow: #a6854e;    /* 幽暗的古銅金 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-plain);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* CRT 網格微弱濾鏡 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.5) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            z-index: 5;
            background-size: 100% 3px, 5px 100%;
            pointer-events: none;
        }

        .terminal-container {
            width: 100%;
            height: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            z-index: 1;
            position: relative;
        }

        .header-bar {
            border-bottom: 1px solid rgba(85, 85, 85, 0.2);
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--term-dim);
            letter-spacing: 3px;
        }

        .output-area {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .output-area::-webkit-scrollbar { width: 2px; }
        .output-area::-webkit-scrollbar-thumb { background: var(--term-dim); }

        .line {
            margin-bottom: 6px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.85rem;
        }

        .sys-dim { color: var(--term-dim); }
        .sys-alert { color: var(--term-alert); font-weight: bold; }
        .sys-glow { color: var(--term-glow); text-shadow: 0 0 4px rgba(166, 133, 78, 0.4); }
        
        .code-block {
            background: rgba(255,255,255,0.01);
            padding: 12px;
            margin: 8px 0;
            border-left: 2px solid #333;
            color: #777;
            font-size: 0.8rem;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid rgba(85, 85, 85, 0.1);
            padding-top: 15px;
        }

        .prompt {
            color: var(--term-dim);
            margin-right: 10px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--term-plain);
            font-family: inherit;
            font-size: 0.9rem;
            flex-grow: 1;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header-bar">
            <span>NODE://DEEP_DUMP_RECEIVER</span>
            <span id="sync-status">STATION: INT_RAW_LISTEN</span>
        </div>

        <div class="output-area" id="output"></div>

        <div class="input-line">
            <span class="prompt">operator@l7e_isolated_node_6:#</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        
        // 5 個碎片檔案內容定義
        const archives = {
            "sys_net": `【NET_LINE_CAPTURE // 180ms FEED】\n系統底層通訊網截收報告。發現不自然重複高頻噪聲，疑似脈衝調變：\n<div class="code-block">SIGNAL_RAW: -..  -..-.  .-.-.-  .-.-.-  .-.-.-  -..-.</div>\n[警語] 無法與當前字典對齊。需手動將調變訊號進行音碼映射。`,

            "sector_08": `【PHYSICAL_SECTOR_08 // DUMP】\n暫存記憶體第 08 磁區塊出錯。遺留未定義之二進位數據位元流：\n<div class="code-block">01100100 01100001 01110100 01100101 01110011 00101111</div>\n[錯誤] 數據校驗失敗，無法直接轉換為物理系統變數。`,

            "b64_dump": `【STORAGE_RESERVED // INTERCEPT】\n高維度隱蔽封包。標頭已被抹除，僅留下採用標準 64 位基數雜湊編碼的字串特徵：\n<div class="code-block">DATA_STREAM: JCEjJS8=</div>\n[提示] 系統無法辨識非文字結構符號，拒絕執行解碼。`,

            "matrix_shift": `【COGNITIVE_MATRIX // SHIFT_CONFIG】\n觀測到流動數據矩陣發生相位偏移，偏移常數已鎖定：\n<div class="code-block">SHIFT_KEY: 13\nENCRYPTED_VECTOR: CNEG_4_VF_)/</div>\n[注意] 符號物理特徵不受偏移常數影響，請保持符號原始狀態。`,

            "parity_rev": `【PARITY_LOG // STACK_OVERFLOW】\n堆疊緩衝區溢位。末端反向迴路（Reverse Loop）異常啟動，導致部分日誌流發生位元倒置反轉：\n<div class="code-block">ERR_0x992A: CRITICAL_STREAM_REVERSED -> [ sgol.- ( ]</div>\n[警告] 迴路損壞嚴重，請忽略末端雜訊，由右至左手動重構原文字串。`
        };

        // 成功盲打敲入隱藏幽靈路徑時顯示的「結構毀損海報文字矩陣」
        const hiddenPosterFile = `【SUCCESS // GHOST_PATH_DECRYPTED】\n路徑共振吻合。正在強行解析封鎖之視覺矩陣資料流...\n\n<div class="sys-glow">[VISUAL_STREAM_DECOVERY_STATUS: 14.82% - LOCKED]</div>\n<div class="sys-dim">
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒████████▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒████████████████▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒███████▒▒▒▒▒▒▒███████▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒██████▒▒ [REDACTED] ▒▒██████▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒██████▒▒  W A R N I N G ▒▒██████▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒██████▒▒  DO NOT SEEK   ▒▒██████▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒██████▒▒  THE TRUTH   ▒▒██████▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒███████▒▒▒▒▒▒▒███████▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒████████████████▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒████████▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒</div>\n
<span class="sys-alert">[警告：全網底層渲染拒絕]</span>\n本機偵測到大範圍物理限制阻斷。在全網頻率「首次對齊（First Poster Reveal）」前，主機拒絕還原完整圖像像素。\n\n【傳輸識別碼：L7E_PHASE_0_STEADY】\n已成功將本端點與視覺源對齊。請存留此路徑。當首張意象海報於現實中投放時，此處像素矩陣將被強行覆寫還原。`;

        const bootSequence = [
            { text: "SIGNAL_STRENGTH: MINIMAL (1.8%)", type: "sys-dim", delay: 100 },
            { text: "COGNITIVE_SHIELD: HIGH_RESISTANCE", type: "sys-alert", delay: 250 },
            { text: "已切斷主動呼叫，終端進入被動接收監聽狀態...", type: "sys-dim", delay: 200 },
            { text: "成功撈取到 5 組斷裂快取封包。輸入 [ help ] 檢視可用控制指令。", type: "sys-dim", delay: 100 },
            { text: "==================================================", type: "sys-dim", delay: 50 }
        ];

        async function playBoot() {
            input.disabled = true;
            for (let seq of bootSequence) {
                await printLine(seq.text, seq.type, seq.delay);
            }
            input.disabled = false;
            input.focus();
            
            if(localStorage.getItem("l7e_ghost_linked_v2") === "true") {
                document.getElementById('sync-status').textContent = "STATION: TUNED_LINK";
                document.getElementById('sync-status').style.color = "var(--term-glow)";
                printLine("\n[本地歷史對齊狀態驗證成功。視覺接收口保持開啟。]", "sys-glow");
            }
        }

        function printLine(text, className = "sys-dim", delay = 0) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = `line ${className}`;
                    line.innerHTML = text;
                    output.appendChild(line);
                    output.scrollTop = output.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                input.value = '';
                if (!rawInput) return;

                await printLine(`operator@l7e_isolated_node_6:# ${rawInput}`, "term-plain");
                
                const parts = rawInput.split(' ');
                const cmd = parts[0].toLowerCase();
                const arg = parts.slice(1).join(' ').trim();

                switch (cmd) {
                    case 'help':
                        await printLine("基礎可用指令：", "sys-dim");
                        await printLine("  ls                 - 檢視殘留快取檔案列表", "sys-dim");
                        await printLine("  cat [檔案/路徑]    - 讀取指定的碎塊檔案", "sys-dim");
                        await printLine("  clear              - 清除終端螢幕緩衝", "sys-dim");
                        break;

                    case 'ls':
                        await printLine("快取記憶體碎塊清單：", "sys-dim");
                        await printLine("  sys_net.chk", "sys-dim");
                        await printLine("  sector_08.bin", "sys-dim");
                        await printLine("  b64_dump.vhd", "sys-dim");
                        await printLine("  matrix_shift.cfg", "sys-dim");
                        await printLine("  parity_rev.err", "sys-dim");
                        break;

                    case 'cat':
                        if (!arg) {
                            await printLine("語法錯誤：未指配目標對象。例如: cat sys_net.chk", "sys-alert");
                        } else if (arg === 'sys_net.chk' || arg === 'sys_net') {
                            await printLine(archives.sys_net, "term-plain");
                        } else if (arg === 'sector_08.bin' || arg === 'sector_08') {
                            await printLine(archives.sector_08, "term-plain");
                        } else if (arg === 'b64_dump.vhd' || arg === 'b64_dump') {
                            await printLine(archives.b64_dump, "term-plain");
                        } else if (arg === 'matrix_shift.cfg' || arg === 'matrix_shift') {
                            await printLine(archives.matrix_shift, "term-plain");
                        } else if (arg === 'parity_rev.err' || arg === 'parity_rev') {
                            await printLine(archives.parity_rev, "term-plain");
                        } 
                        // 【盲打盲猜的絕對隱藏幽靈路徑】
                        else if (arg === 'd/.../dates/$!#%/)/(-.logs') {
                            localStorage.setItem("l7e_ghost_linked_v2", "true");
                            document.getElementById('sync-status').textContent = "STATION: TUNED_LINK";
                            document.getElementById('sync-status').style.color = "var(--term-glow)";
                            
                            await printLine(hiddenPosterFile, "term-plain", 100);
                        } else {
                            await printLine(`錯誤：指定之路徑或檔案 '${arg}' 未配置，或該位址查無有效數據。`, "sys-alert");
                        }
                        break;

                    case 'clear':
                        output.innerHTML = '';
                        break;

                    default:
                        await printLine(`指令未定義: '${cmd}'。輸入 'help' 檢視可用核心指令。`, "sys-alert");
                        break;
                }
            }
        });

        document.addEventListener('click', () => {
            if (!input.disabled) input.focus();
        });

        playBoot();
    </script>
</body>
</html>
