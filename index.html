<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L7E // SOURCE_FEED_NET</title>
    <style>
        :root {
            --bg-color: #050505;
            --terminal-color: #7a7a7a; /* 冰冷的灰色調，代表尚未覺醒的黑白世界 */
            --accent-gold: #bfa15f;    /* 微弱的金色，代表高權限訊號 */
            --alert-red: #a33b3b;
            --text-color: #cccccc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* CRT 濾鏡與微弱閃爍 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 2;
            background-size: 100% 3px, 4px 100%;
            pointer-events: none;
        }

        .terminal-container {
            width: 100%;
            height: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            z-index: 1;
            position: relative;
        }

        .header-bar {
            border-bottom: 1px solid rgba(122, 122, 122, 0.2);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--terminal-color);
            letter-spacing: 2px;
        }

        .output-area {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .output-area::-webkit-scrollbar { width: 3px; }
        .output-area::-webkit-scrollbar-thumb { background: var(--terminal-color); }

        .line {
            margin-bottom: 8px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.9rem;
        }

        .sys-msg { color: var(--terminal-color); }
        .gold-msg { color: var(--accent-gold); text-shadow: 0 0 4px rgba(191, 161, 95, 0.3); }
        .error-msg { color: var(--alert-red); }
        .code-block { background: rgba(255,255,255,0.03); padding: 10px; margin: 5px 0; border-left: 2px solid var(--terminal-color); color: #888; }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid rgba(122, 122, 122, 0.1);
            padding-top: 15px;
        }

        .prompt {
            color: var(--terminal-color);
            margin-right: 10px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            flex-grow: 1;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header-bar">
            <span>NODE://L7E_LOG_RECEIVER</span>
            <span id="sync-status">STATION: LISTEN_MODE</span>
        </div>

        <div class="output-area" id="output"></div>

        <div class="input-line">
            <span class="prompt">root@L7E_RECV_OS:~#</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        
        // 破碎、無劇透的硬核謎題日誌
        const archives = {
            "telemetry": `【TELEMETRY_DATA // METRIC_RECOVERY】\n\nTIMESTAMP: UNKNOWN\nCOORDINATE: [DATA_CORRUPTED]\n\n觀測到背景微波輻射異常偏移。非自然噪聲。該訊號正在嘗試以單一波長覆蓋其餘頻道。\n底層數據流發生溢位，以下為攔截到的未對齊原始字節（RAW BYTES）：`,
            "hex_hint": `\n<div class="code-block">4c 37 45 5f 49 4e 49 54</div>\n[系統提示]：底層防護網拒絕未格式化的請求。請將上述 16 進位向量碼（Hexadecimal）轉換為標準 ASCII 字串，並使用 [ decrypt ] 指令將其送入核心解碼。`
        };

        const bootSequence = [
            { text: "L7E TERMINAL OS (v0.0.1-alpha)", type: "sys-msg", delay: 100 },
            { text: "ESTABLISHING AMBIENT LINK...", type: "sys-msg", delay: 300 },
            { text: "NET_STATUS: NO RESPONSE FROM HOST.", type: "error-msg", delay: 400 },
            { text: "SWITCHING TO PASSIVE INTERCEPT MODE...", type: "sys-msg", delay: 200 },
            { text: "成功撈取到 1 組封包殘留。輸入 [ help ] 檢視基礎指令。", type: "sys-msg", delay: 100 },
            { text: "==================================================", type: "sys-msg", delay: 50 }
        ];

        async function playBoot() {
            input.disabled = true;
            for (let seq of bootSequence) {
                await printLine(seq.text, seq.type, seq.delay);
            }
            input.disabled = false;
            input.focus();
            
            if(localStorage.getItem("l7e_alpha_linked") === "true") {
                document.getElementById('sync-status').textContent = "STATION: SIGNAL_LOCKED";
                document.getElementById('sync-status').style.color = "var(--accent-gold)";
                printLine("\n[檢測到既存的頻率對齊紀錄。高權限資料流已就緒。]", "gold-msg");
            }
        }

        function printLine(text, className = "sys-msg", delay = 0) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = `line ${className}`;
                    line.innerHTML = text;
                    output.appendChild(line);
                    output.scrollTop = output.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                input.value = '';
                if (!rawInput) return;

                await printLine(`root@L7E_RECV_OS:~# ${rawInput}`, "text-color");
                const parts = rawInput.split(' ');
                const cmd = parts[0].toLowerCase();
                const arg = parts.slice(1).join(' ');

                switch (cmd) {
                    case 'help':
                        await printLine("可執行指令：", "sys-msg");
                        await printLine("  ls                 - 檢查快取區殘留檔案", "sys-msg");
                        await printLine("  cat [檔案名稱]     - 輸出指定檔案內容", "sys-msg");
                        await printLine("  decrypt [解密金鑰] - 輸入對齊後的金鑰以突破鎖定", "sys-msg");
                        await printLine("  clear              - 清除終端畫面", "sys-msg");
                        break;

                    case 'ls':
                        await printLine("快取區檔案列表：", "sys-msg");
                        await printLine("  signal_telemetry.log", "sys-msg");
                        if (localStorage.getItem("l7e_alpha_linked") === "true") {
                            await printLine("  POSTER_DATA_STREAM.dat (已解鎖)", "gold-msg");
                        } else {
                            await printLine("  [??] 未知的高難度加密封包 (封鎖中，需執行 decrypt)", "error-msg");
                        }
                        break;

                    case 'cat':
                        if (!arg) {
                            await printLine("系統錯誤：未指定目標。用法例如: cat signal_telemetry.log", "error-msg");
                        } else if (arg === 'signal_telemetry.log' || arg === 'signal_telemetry') {
                            await printLine(archives.telemetry, "text-color");
                            await printLine(archives.hex_hint, "sys-msg");
                        } else if (arg === 'POSTER_DATA_STREAM.dat' || arg === 'POSTER_DATA_STREAM') {
                            if (localStorage.getItem("l7e_alpha_linked") === "true") {
                                await printLine("【POSTER_DATA_STREAM // 訊號同步完畢】\n\n『第一層帷幕正在編譯中。』\n\n此端點已成功鎖定視覺訊號源（Visual Matrix）。\n當前狀態：[AWAITING_PHYSICAL_TRANSMISSION]\n\n本機正在等待母體傳輸【首張意象海報】的完整像素數據。\n請維持終端機連線，並留意後續全網頻率的首次對齊。真相將至。", "gold-msg");
                            } else {
                                await printLine("權限遭拒。該資料夾目前僅存在隨機雜訊，請先執行金鑰解密。", "error-msg");
                            }
                        } else {
                            await printLine(`錯誤：找不到名為 '${arg}' 的檔案。`, "error-msg");
                        }
                        break;

                    case 'decrypt':
                        if (!arg) {
                            await printLine("錯誤：語法不完整。必須指定解密金鑰。用法：decrypt [金鑰]", "error-msg");
                            await printLine("提示：請先使用 'cat signal_telemetry.log' 獲取 16 進位字節，將其轉換為 ASCII 碼後輸入。", "sys-msg");
                        } else if (arg.toUpperCase() === 'L7E_INIT') {
                            localStorage.setItem("l7e_alpha_linked", "true");
                            document.getElementById('sync-status').textContent = "STATION: SIGNAL_LOCKED";
                            document.getElementById('sync-status').style.color = "var(--accent-gold)";
                            await printLine("==========================================", "gold-msg", 50);
                            await printLine("【CORE DECRYPT SUCCESS】波長匹配完成。", "gold-msg", 100);
                            await printLine("隱藏高權限封包 [ POSTER_DATA_STREAM.dat ] 已開放。請使用 cat 指令檢視。", "gold-msg", 100);
                            await printLine("==========================================", "gold-msg", 50);
                        } else {
                            await printLine(`【解碼失敗】金鑰 '${arg}' 無法與當前矩陣共振。`, "error-msg");
                        }
                        break;

                    case 'clear':
                        output.innerHTML = '';
                        break;

                    default:
                        await printLine(`命令不正確: '${cmd}'。輸入 'help' 獲取系統協助。`, "error-msg");
                        break;
                }
            }
        });

        document.addEventListener('click', () => {
            if (!input.disabled) input.focus();
        });

        playBoot();
    </script>
</body>
</html>
